<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Server Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #130b24 0%, #050505 70%);
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90vh;
            position: relative;
            overflow-x: hidden;
            background-color: #050505;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            z-index: 1;
        }

        .ceas-container {
            font-size: 2.2rem;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 2px;
            margin-bottom: 2px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        .data-container {
            font-size: 0.95rem;
            color: #475569;
            font-weight: 500;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.8rem;
            margin-top: 10px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.08);
            font-weight: 800;
        }

        .status-retea {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 45px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .grid-servicii {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 35px 15px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(30, 41, 59, 0.85);
            border-color: #38bdf8;
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.15);
        }

        .card-logo {
            width: 65px;
            height: 65px;
            margin-bottom: 20px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover .card-logo {
            transform: scale(1.1) rotate(5deg);
        }

        .titlu-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #64748b;
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
        }

        .led-online {
            background-color: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        .led-offline {
            background-color: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }

        .card-desc {
            font-size: 0.85rem;
            color: #64748b;
            transition: color 0.25s ease;
        }

        .card:hover .card-desc {
            color: #cbd5e1;
        }

        @media (max-width: 850px) { .grid-servicii { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .grid-servicii { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="ceas" class="ceas-container">00:00</div>
        <div id="data-azi" class="data-container">Joi, 1 Ianuarie</div>
        
        <h1>Home Server Hub</h1>
        
        <div id="status" class="status-retea">🔍 Se verifică locația rețelei...</div>
        
        <div class="grid-servicii">

            <a href="https://jelly.server-diverse.com" id="link-jellyfin" target="_blank" class="card">
                <img src="jellyfin.png" alt="Jellyfin" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">Jellyfin</div>
                    <div id="led-jellyfin" class="led"></div>
                </div>
                <div class="card-desc">Filme & Seriale</div>
            </a>

            <a href="https://nextcloud.server-diverse.com" id="link-nextcloud" target="_blank" class="card">
                <img src="nextcloud.png" alt="Nextcloud" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">Nextcloud</div>
                    <div id="led-nextcloud" class="led"></div>
                </div>
                <div class="card-desc">Stocare Cloud</div>
            </a>

            <a href="https://cerere.server-diverse.com" id="link-seerr" target="_blank" class="card">
                <img src="seerr.png" alt="Seerr" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">Seerr</div>
                    <div id="led-seerr" class="led"></div>
                </div>
                <div class="card-desc">Cereri Media</div>
            </a>

            <a href="https://server-diverse.com" id="link-truenas" target="_blank" class="card">
                <img src="truenas.png" alt="TrueNAS" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">TrueNAS</div>
                    <div id="led-truenas" class="led"></div>
                </div>
                <div class="card-desc">Administrare NAS</div>
            </a>

        </div>

    </div>

    <script>
        function updateTimp() {
            const acum = new Date();
            const ore = String(acum.getHours()).padStart(2, '0');
            const minute = String(acum.getMinutes()).padStart(2, '0');
            document.getElementById('ceas').innerText = ore + ":" + minute;
            
            const optiuni = { weekday: 'long', day: 'numeric', month: 'long' };
            let dataFormatata = acum.toLocaleDateString('ro-RO', optiuni);
            dataFormatata = dataFormatata.charAt(0).toUpperCase() + dataFormatata.slice(1);
            document.getElementById('data-azi').innerText = dataFormatata;
        }
        updateTimp();
        setInterval(updateTimp, 1000);

        const ipLocalNAS = "192.168.0.109";
        
        const configServicii = {
            "jellyfin": { local: `http://${ipLocalNAS}:8096`, extern: "https://jelly.server-diverse.com", elementLink: "link-jellyfin", elementLed: "led-jellyfin" },
            "nextcloud": { local: `http://${ipLocalNAS}:30026`, extern: "https://nextcloud.server-diverse.com", pathWan: "/core/img/favicon.ico", elementLink: "link-nextcloud", elementLed: "led-nextcloud" },
            "seerr": { local: `http://${ipLocalNAS}:30357`, extern: "https://cerere.server-diverse.com", pathWan: "/favicon.ico", elementLink: "link-seerr", elementLed: "led-seerr" },
            "truenas": { local: `https://${ipLocalNAS}:444`, extern: "https://server-diverse.com", elementLink: "link-truenas", elementLed: "led-truenas" }
        };

        function pornesteMonitorizare() {
            const controllerRetea = new AbortController();
            const timeoutRetea = setTimeout(() => controllerRetea.abort(), 1200);

            fetch(`http://${ipLocalNAS}`, { mode: 'no-cors', signal: controllerRetea.signal })
                .then(() => {
                    clearTimeout(timeoutRetea);
                    document.getElementById("status").innerHTML = "🏠 Conexiune Locală (Viteză Maximă LAN)";
                    document.getElementById("status").style.color = "#10b981";
                    return ruleazaVerificareServicii(true);
                })
                .catch(() => {
                    clearTimeout(timeoutRetea);
                    document.getElementById("status").innerHTML = "🌐 Conexiune Externă (Prin Cloudflare)";
                    document.getElementById("status").style.color = "#38bdf8";
                    return ruleazaVerificareServicii(false);
                })
                .then(() => {
                    setTimeout(pornesteMonitorizare, 5000);
                });
        }

        function ruleazaVerificareServicii(estePeLocal) {
            return new Promise((resolveParent) => {
                let statusContainere = { jellyfin: false, nextcloud: false, seerr: false };
                let promisiuni = [];
                const cheiServicii = ["jellyfin", "nextcloud", "seerr"];

                cheiServicii.forEach((cheie) => {
                    const serviciu = configServicii[cheie];
                    const urlBaza = estePeLocal ? serviciu.local : serviciu.extern;
                    
                    document.getElementById(serviciu.elementLink).href = urlBaza;

                    let p = new Promise((resolve) => {
                        if (estePeLocal) {
                            const controller = new AbortController();
                            const tm = setTimeout(() => { controller.abort(); resolve(false); }, 2500);

                            fetch(urlBaza + "?nc=" + new Date().getTime(), { mode: 'no-cors', signal: controller.signal })
                                .then(() => { clearTimeout(tm); resolve(true); })
                                .catch(() => { clearTimeout(tm); resolve(false); });
                        } else {
                            if (cheie === "jellyfin") {
                                const controllerJF = new AbortController();
                                const tmJF = setTimeout(() => { controllerJF.abort(); resolve(false); }, 3000);

                                fetch(urlBaza + "/System/Info/Public", { signal: controllerJF.signal })
                                    .then((res) => {
                                        clearTimeout(tmJF);
                                        resolve(res.ok);
                                    })
                                    .catch(() => {
                                        clearTimeout(tmJF);
                                        resolve(false);
                                    });
                            } else {
                                const imgTest = new Image();
                                imgTest.src = urlBaza + serviciu.pathWan + "?nc=" + new Date().getTime();
                                const tm = setTimeout(() => { imgTest.src = ""; resolve(false); }, 4000);
                                imgTest.onload = function() { clearTimeout(tm); resolve(true); };
                                imgTest.onerror = function() { clearTimeout(tm); resolve(false); };
                            }
                        }
                    }).then((rezultatOnline) => {
                        statusContainere[cheie] = rezultatOnline;
                        seteazaLedStatus(serviciu.elementLed, rezultatOnline);
                    });

                    promisiuni.push(p);
                });

                Promise.all(promisiuni).then(() => {
                    const urlTrueNas = estePeLocal ? configServicii["truenas"].local : configServicii["truenas"].extern;
                    document.getElementById(configServicii["truenas"].elementLink).href = urlTrueNas;

                    if (!statusContainere.jellyfin && !statusContainere.nextcloud && !statusContainere.seerr) {
                        seteazaLedStatus(configServicii["truenas"].elementLed, false);
                        document.getElementById("status").innerHTML = "🚨 SERVER HARDWARE OFFLINE (SHUTDOWN)";
                        document.getElementById("status").style.color = "#ef4444";
                        resolveParent();
                    } else {
                        const controllerTN = new AbortController();
                        const tmTN = setTimeout(() => { controllerTN.abort(); seteazaLedStatus(configServicii["truenas"].elementLed, false); resolveParent(); }, 2500);
                        
                        fetch(urlTrueNas + "?nc=" + new Date().getTime(), { mode: 'no-cors', signal: controllerTN.signal })
                            .then(() => { clearTimeout(tmTN); seteazaLedStatus(configServicii["truenas"].elementLed, true); resolveParent(); })
                            .catch(() => { clearTimeout(tmTN); seteazaLedStatus(configServicii["truenas"].elementLed, false); resolveParent(); });
                        
                        if (!estePeLocal) {
                            document.getElementById("status").innerHTML = "🌐 Conexiune Externă (Prin Cloudflare)";
                            document.getElementById("status").style.color = "#38bdf8";
                        }
                    }
                });
            });
        }

        function seteazaLedStatus(idLed, esteOnline) {
            const led = document.getElementById(idLed);
            if (esteOnline) {
                led.classList.remove('led-offline');
                led.classList.add('led-online');
            } else {
                led.classList.remove('led-online');
                led.classList.add('led-offline');
            }
        }

        pornesteMonitorizare();
    </script>
</body>
</html>

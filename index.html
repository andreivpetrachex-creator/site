<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Server Hub</title>
    <style>
        /* FUNDALUL DINAMIC PREFERAT: Degradul mov/indigo care se mișcă fluid */
        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90vh;
            position: relative;
            overflow-x: hidden;
        }

        /* MATRICEA CU PĂTRĂȚELE (Liniile discrete de pe fundal) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            z-index: 1;
        }

        /* Stil ceas minimalist */
        .ceas-container {
            font-size: 1.8rem;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            font-weight: 800;
        }

        .subtitlu {
            color: #38bdf8;
            margin-bottom: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-retea {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .grid-servicii {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px 15px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #38bdf8;
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.25);
        }

        .card-logo {
            width: 65px;
            height: 65px;
            margin-bottom: 20px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }

        .card:hover .card-logo {
            transform: rotate(5deg) scale(1.1);
        }

        /* Aliniere Titlu + LED în interiorul cardului */
        .titlu-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* STILUL PENTRU LED-URI */
        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #64748b; /* Gri când se încarcă */
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
        }

        .led-online {
            background-color: #10b981; /* Verde */
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        .led-offline {
            background-color: #ef4444; /* Roșu */
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }

        .card-desc {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        @media (max-width: 850px) { .grid-servicii { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .grid-servicii { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="ceas" class="ceas-container">00:00</div>
        
        <h1>Home Server Hub</h1>
        <div class="subtitlu">Sistem Centralizat</div>
        
        <div id="status" class="status-retea">🔍 Se verifică locația rețelei...</div>
        
        <div class="grid-servicii">

            <a href="https://jelly.server-diverse.com" id="link-jellyfin" target="_blank" class="card">
                <img src="jellyfin.png" alt="Jellyfin" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">Jellyfin</div>
                    <div id="led-jellyfin" class="led"></div>
                </div>
                <div class="card-desc">Filme & Seriale</div>
            </a>

            <a href="https://nextcloud.server-diverse.com" id="link-nextcloud" target="_blank" class="card">
                <img src="nextcloud.png" alt="Nextcloud" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">Nextcloud</div>
                    <div id="led-nextcloud" class="led"></div>
                </div>
                <div class="card-desc">Stocare Cloud</div>
            </a>

            <a href="https://cerere.server-diverse.com" id="link-seerr" target="_blank" class="card">
                <img src="seerr.png" alt="Seerr" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">Seerr</div>
                    <div id="led-seerr" class="led"></div>
                </div>
                <div class="card-desc">Cereri Media</div>
            </a>

            <a href="https://server-diverse.com" id="link-truenas" target="_blank" class="card">
                <img src="truenas.png" alt="TrueNAS" class="card-logo">
                <div class="titlu-container">
                    <div class="card-title">TrueNAS</div>
                    <div id="led-truenas" class="led"></div>
                </div>
                <div class="card-desc">Administrare NAS</div>
            </a>

        </div>

    </div>

    <script>
        // ================= FUNCTIE CEAS =================
        function updateCeas() {
            const acum = new Date();
            const ore = String(acum.getHours()).padStart(2, '0');
            const minute = String(acum.getMinutes()).padStart(2, '0');
            document.getElementById('ceas').innerText = ore + ":" + minute;
        }
        updateCeas();
        setInterval(updateCeas, 1000);

        // ================= CONFIGURARE SERVER ȘI RUTE =================
        const ipLocalNAS = "192.168.0.109";
        
        const configServicii = {
            "jellyfin": { local: `http://${ipLocalNAS}:8096`, extern: "https://jelly.server-diverse.com", elementLink: "link-jellyfin", elementLed: "led-jellyfin" },
            "nextcloud": { local: `http://${ipLocalNAS}:30026`, extern: "https://nextcloud.server-diverse.com", pathWan: "/core/img/favicon.ico", elementLink: "link-nextcloud", elementLed: "led-nextcloud" },
            "seerr": { local: `http://${ipLocalNAS}:30357`, extern: "https://cerere.server-diverse.com", pathWan: "/favicon.ico", elementLink: "link-seerr", elementLed: "led-seerr" },
            "truenas": { local: `http://${ipLocalNAS}`, extern: "https://server-diverse.com", elementLink: "link-truenas", elementLed: "led-truenas" }
        };

        // ================= DETECȚIE AUTOMATĂ ȘI VERIFICARE LEDURI =================
        function verificaReteaSiServicii() {
            const t0 = performance.now();
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 1200);

            // Pasul 1: Testăm locația rețelei prin latență pe portul securizat local (HTTPS)
            fetch(`https://${ipLocalNAS}:444`, { mode: 'no-cors', signal: controller.signal })
                .then(() => {
                    clearTimeout(timeoutId);
                    ruleazaVerificareLive(true);
                })
                .catch((err) => {
                    clearTimeout(timeoutId);
                    const durataInMilisecunde = performance.now() - t0;
                    
                    // Truc: Dacă răspunsul de eroare vine instant (sub 700ms), înseamnă că serverul e fizic în cameră
                    if (durataInMilisecunde < 700 && err.name !== 'AbortError') {
                        ruleazaVerificareLive(true);
                    } else {
                        ruleazaVerificareLive(false);
                    }
                });
        }

        // Pasul 2: Schimbăm link-urile și verificăm starea fiecărui site pentru a aprinde ledul
        function ruleazaVerificareLive(estePeLocal) {
            const statusEl = document.getElementById("status");
            if (estePeLocal) {
                statusEl.innerHTML = "🏠 Conexiune Locală (Viteză Maximă LAN)";
                statusEl.style.color = "#10b981";
            } else {
                statusEl.innerHTML = "🌐 Conexiune Externă (Prin Cloudflare)";
                statusEl.style.color = "#38bdf8";
            }

            // Verificăm fiecare serviciu din listă
            for (let cheie in configServicii) {
                const serviciu = configServicii[cheie];
                const urlBaza = estePeLocal ? serviciu.local : serviciu.extern;
                
                // Actualizează adresa URL de pe card
                document.getElementById(serviciu.elementLink).href = urlBaza;

                // Testăm dacă serviciul este ONLINE sau OFFLINE
                if (estePeLocal) {
                    // Dacă ești acasă, trimitem un ping rapid no-cors direct pe portul local
                    const controllerServiciu = new AbortController();
                    const tm = setTimeout(() => { controllerServiciu.abort(); seteazaLedStatus(serviciu.elementLed, false); }, 2500);

                    fetch(urlBaza + "?nc=" + Date.now(), { mode: 'no-cors', signal: controllerServiciu.signal })
                        .then(() => { clearTimeout(tm); seteazaLedStatus(serviciu.elementLed, true); })
                        .catch(() => { clearTimeout(tm); seteazaLedStatus(serviciu.elementLed, false); });
                } else {
                    // Dacă ești plecat, testăm prin Cloudflare folosind metode specifice
                    if (cheie === "jellyfin") {
                        const controllerJF = new AbortController();
                        const tmJF = setTimeout(() => { controllerJF.abort(); seteazaLedStatus(serviciu.elementLed, false); }, 3000);
                        fetch(urlBaza + "/System/Info/Public", { signal: controllerJF.signal })
                            .then(res => { clearTimeout(tmJF); seteazaLedStatus(serviciu.elementLed, res.ok); })
                            .catch(() => { clearTimeout(tmJF); seteazaLedStatus(serviciu.elementLed, false); });
                    } else if (cheie === "truenas") {
                        const controllerTN = new AbortController();
                        const tmTN = setTimeout(() => { controllerTN.abort(); seteazaLedStatus(serviciu.elementLed, false); }, 3000);
                        fetch(urlBaza + "?nc=" + Date.now(), { mode: 'no-cors', signal: controllerTN.signal })
                            .then(() => { clearTimeout(tmTN); seteazaLedStatus(serviciu.elementLed, true); })
                            .catch(() => { clearTimeout(tmTN); seteazaLedStatus(serviciu.elementLed, false); });
                    } else {
                        // Pentru Nextcloud și Seerr încărcăm o iconiță în fundal ca test extern
                        const imgTest = new Image();
                        imgTest.src = urlBaza + serviciu.pathWan + "?nc=" + Date.now();
                        const tm = setTimeout(() => { imgTest.src = ""; seteazaLedStatus(serviciu.elementLed, false); }, 4000);
                        imgTest.onload = function() { clearTimeout(tm); seteazaLedStatus(serviciu.elementLed, true); };
                        imgTest.onerror = function() { clearTimeout(tm); seteazaLedStatus(serviciu.elementLed, false); };
                    }
                }
            }
        }

        // Funcție care schimbă culoarea bulenei LED
        function seteazaLedStatus(idLed, esteOnline) {
            const led = document.getElementById(idLed);
            if (!led) return;
            if (esteOnline) {
                led.classList.remove('led-offline');
                led.classList.add('led-online');
            } else {
                led.classList.remove('led-online');
                led.classList.add('led-offline');
            }
        }

        // Pornește verificarea imediat la deschiderea paginii
        verificaReteaSiServicii();

        // Repetă verificarea completă automat la fiecare 10 secunde
        setInterval(verificaReteaSiServicii, 10000);
    </script>
</body>
</html>
